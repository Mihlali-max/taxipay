services:
  - type: web
    name: taxipay-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taxipay-db
          property: connectionString

databases:
  - name: taxipay-db
    plan: free
