
services:
  app:
    build: .
    container_name: taxipay_app
    env_file:
      - .env
    volumes:
      - .:/app
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  nginx:
    image: nginx:alpine
    container_name: taxipay_nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
